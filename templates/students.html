{% extends "base.html" %}
{% block title %}学生管理{% endblock %}
{% block content %}
<section class="panel">
  <div class="section-title">
    <h1>学生管理</h1>
  </div>
  <form method="post" class="form-grid">
    <input name="student_id" placeholder="学号" required>
    <input name="student_name" placeholder="姓名" required>
    <select name="gender" required>
      <option value="男">男</option>
      <option value="女">女</option>
    </select>
    <select name="class_id" required>
      {% for item in classes %}
      <option value="{{ item.class_id }}">{{ item.label }}</option>
      {% endfor %}
    </select>
    <input name="phone" placeholder="电话">
    <input name="email" type="email" placeholder="邮箱">
    <button type="submit">添加学生</button>
  </form>
</section>

<section class="panel">
  <table>
    <thead>
      <tr>
        <th>学号</th>
        <th>姓名</th>
        <th>性别</th>
        <th>学院</th>
        <th>专业</th>
        <th>班级</th>
        <th>状态</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.student_id }}</td>
        <td>{{ row.student_name }}</td>
        <td>{{ row.gender }}</td>
        <td>{{ row.dept_name }}</td>
        <td>{{ row.major_name }}</td>
        <td>{{ row.class_name }}</td>
        <td><span class="tag">{{ row.status }}</span></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
